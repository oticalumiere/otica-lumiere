<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ótica Lumière ERP</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--rose:#b76e79;--gold:#c9a227;--bg:#fff7f8;--card:#fff;--txt:#2b2526;--muted:#7d6b6f;--line:#ead6da;--danger:#c0392b;--ok:#168a52;--warn:#b7791f;--blue:#2563eb}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(135deg,#fff7f8,#fff);color:var(--txt)}
    header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:14px 18px;display:flex;gap:12px;align-items:center;justify-content:space-between}
    .brand{display:flex;gap:10px;align-items:center;font-weight:800;color:var(--rose);font-size:20px}.logo{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,var(--rose),#f2c7cf);display:grid;place-items:center;color:white}
    main{padding:18px;max-width:1200px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 8px 20px #b76e7912}.card h3{margin:0;color:var(--muted);font-size:13px}.num{font-size:25px;font-weight:800;margin-top:8px;color:var(--rose)}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.btn{border:0;border-radius:12px;padding:11px 14px;font-weight:700;background:var(--rose);color:#fff;cursor:pointer}.btn.secondary{background:#fff;color:var(--rose);border:1px solid var(--rose)}.btn.gray{background:#f3e7ea;color:#5b454a}.btn.ok{background:var(--ok)}.btn.warn{background:var(--warn)}.btn.danger{background:var(--danger)}
    input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:15px}label{font-size:13px;color:var(--muted);font-weight:700}.formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.section{margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.section h2{margin:0 0 12px;color:var(--rose)}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}th{color:var(--muted);background:#fff8f9}.actions{display:flex;gap:6px;flex-wrap:wrap}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#f6e5e8;color:var(--rose);font-weight:800;font-size:12px}.hidden{display:none!important}
    dialog{border:0;border-radius:22px;width:min(900px,94vw);padding:0;box-shadow:0 25px 80px #0003}dialog::backdrop{background:#0006}.modal-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal-body{padding:18px;max-height:78vh;overflow:auto}.person{border:1px dashed var(--line);border-radius:14px;padding:12px;margin:10px 0;background:#fffafa}.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:12px 16px;border-radius:12px;z-index:99;display:none}
    .tabs{display:flex;gap:8px;overflow:auto;padding-bottom:6px}.tab{white-space:nowrap}.list{display:grid;gap:10px}.item{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.small{font-size:12px;color:var(--muted)}
    @media(max-width:650px){th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4){display:none}.actions .btn{padding:9px 10px;font-size:12px}main{padding:12px}}
  </style>
</head>
<body>
<header><div class="brand"><div class="logo">👓</div><div>Ótica Lumière ERP<div class="small">Sistema online</div></div></div><button class="btn secondary" onclick="openCliente()">+ Novo cliente</button></header>
<main>
  <div class="grid" id="cards"></div>
  <div class="toolbar"><input id="search" placeholder="Buscar por nome, telefone, endereço ou OS..." oninput="render()"><button class="btn" onclick="openCliente()">+ Novo cliente</button><button class="btn secondary" onclick="openConserto()">+ Conserto</button></div>
  <div class="tabs"><button class="btn gray tab" onclick="setTab('clientes')">Clientes</button><button class="btn gray tab" onclick="setTab('sem')">Sem armação</button><button class="btn gray tab" onclick="setTab('exame')">Falta exame</button><button class="btn gray tab" onclick="setTab('hoje')">Vencendo hoje</button><button class="btn gray tab" onclick="setTab('atrasados')">Atrasados</button><button class="btn gray tab" onclick="setTab('remarcados')">Remarcados</button><button class="btn gray tab" onclick="setTab('consertos')">Consertos</button></div>
  <section class="section"><h2 id="title">Clientes</h2><div id="content"></div></section>
</main>

<dialog id="clienteDlg"><div class="modal-head"><b id="modalTitle">Novo cliente</b><button class="btn gray" onclick="clienteDlg.close()">Fechar</button></div><div class="modal-body">
  <input type="hidden" id="cid"><div class="formgrid">
    <div><label>Data da venda</label><input type="date" id="data_venda"></div><div><label>Telefone</label><input id="telefone" placeholder="(00) 00000-0000"></div><div><label>Endereço</label><input id="endereco"></div><div><label>Laboratório</label><select id="laboratorio"><option>Henrique</option><option>Optec</option><option>Magno</option><option>Casa</option><option>Outro</option></select></div>
    <div><label>Data prevista</label><input type="date" id="data_prevista"></div><div><label>Valor total</label><input type="number" id="valor_total" oninput="calcRestante()"></div><div><label>Entrada</label><input type="number" id="entrada" oninput="calcRestante()"></div><div><label>Restante</label><input type="number" id="restante" readonly></div>
  </div>
  <div class="section"><h2>Clientes do pedido</h2><div id="pessoasBox"></div><button class="btn secondary" onclick="addPessoa()">+ Adicionar outro nome</button></div>
  <div class="formgrid"><label><input type="checkbox" id="sem_armacao" style="width:auto"> Sem armação</label><label><input type="checkbox" id="falta_exame" style="width:auto"> Falta exame</label></div>
  <div style="margin-top:12px"><label>Observações</label><textarea id="observacoes"></textarea></div>
  <div class="toolbar"><button class="btn ok" onclick="salvarCliente()">Salvar</button><button class="btn gray" onclick="clienteDlg.close()">Cancelar</button></div>
</div></dialog>

<dialog id="consertoDlg"><div class="modal-head"><b>Novo conserto</b><button class="btn gray" onclick="consertoDlg.close()">Fechar</button></div><div class="modal-body"><div class="formgrid"><div><label>Cliente</label><input id="c_cliente"></div><div><label>Telefone</label><input id="c_telefone"></div><div><label>Serviço</label><input id="c_servico"></div><div><label>Valor</label><input type="number" id="c_valor"></div><div><label>Previsão</label><input type="date" id="c_previsao"></div><div><label>Status</label><select id="c_status"><option>Recebido</option><option>Em conserto</option><option>Aguardando peça</option><option>Pronto</option><option>Entregue</option></select></div></div><div style="margin-top:12px"><label>Observações</label><textarea id="c_obs"></textarea></div><div class="toolbar"><button class="btn ok" onclick="salvarConserto()">Salvar conserto</button></div></div></dialog>
<div class="toast" id="toast">Copiado!</div>
<script>
const SUPABASE_URL='https://mjwttqyvrwztpionkoyh.supabase.co';
const SUPABASE_KEY='sb_publishable__ubkt2h3nY2VyXu7xRvAuw_9EtuZbfl';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let clientes=[],consertos=[],tab='clientes';
const $=id=>document.getElementById(id); const today=()=>new Date().toISOString().slice(0,10); const money=v=>'R$ '+Number(v||0).toFixed(2).replace('.',',');
function toast(t){$('toast').textContent=t;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',1600)}
async function load(){let cr=await sb.from('clientes').select('*').order('criado_em',{ascending:false}); if(!cr.error) clientes=cr.data||[]; let co=await sb.from('consertos').select('*').order('criado_em',{ascending:false}); if(!co.error) consertos=co.data||[]; render()}
function pessoas(c){try{return JSON.parse(c.observacoes||'{}').pessoas||[{nome:c.nome,entregue:c.entregue}]}catch{return [{nome:c.nome,entregue:c.entregue}]}}
function obsLivre(c){try{return JSON.parse(c.observacoes||'{}').obs||''}catch{return c.observacoes||''}}
function allDelivered(c){return pessoas(c).every(p=>p.entregue)}
function status(c){if(allDelivered(c))return 'Entregue'; if(pessoas(c).some(p=>p.entregue))return 'Entregue parcial'; if(c.data_prevista<today())return 'Atrasado'; if(c.data_prevista===today())return 'Vence hoje'; return c.status||'Em aberto'}
function setTab(t){tab=t;render()}
function filtered(){let q=$('search').value.toLowerCase(); let arr=clientes.filter(c=>([c.pedido,c.nome,c.telefone,c.endereco,JSON.stringify(pessoas(c))].join(' ').toLowerCase()).includes(q)); if(tab==='sem')arr=arr.filter(c=>c.sem_armacao&&!allDelivered(c)); if(tab==='exame')arr=arr.filter(c=>c.falta_exame&&!allDelivered(c)); if(tab==='hoje')arr=arr.filter(c=>c.data_prevista===today()&&!allDelivered(c)); if(tab==='atrasados')arr=arr.filter(c=>c.data_prevista&&c.data_prevista<today()&&!allDelivered(c)&&!c.data_remarcada); if(tab==='remarcados')arr=arr.filter(c=>c.data_remarcada); return arr}
function renderCards(){let venc=clientes.filter(c=>c.data_prevista===today()&&!allDelivered(c)).length; let atr=clientes.filter(c=>c.data_prevista&&c.data_prevista<today()&&!allDelivered(c)&&!c.data_remarcada).length; let sem=clientes.filter(c=>c.sem_armacao&&!allDelivered(c)).length; let ex=clientes.filter(c=>c.falta_exame&&!allDelivered(c)).length; let pr=clientes.filter(c=>status(c)==='Vence hoje'||status(c)==='Em aberto').length; let mes=new Date().toISOString().slice(0,7); let vendaMes=clientes.filter(c=>(c.data_venda||'').startsWith(mes)).reduce((s,c)=>s+Number(c.valor_total||0),0); $('cards').innerHTML=[['Pedidos',clientes.length],['Vencendo hoje',venc],['Atrasados',atr],['Sem armação',sem],['Falta exame',ex],['Consertos',consertos.length],['Vendas do mês',money(vendaMes)]].map(x=>`<div class="card"><h3>${x[0]}</h3><div class="num">${x[1]}</div></div>`).join('')}
function render(){renderCards(); let titles={clientes:'Clientes',sem:'Sem armação',exame:'Falta exame',hoje:'Vencendo hoje',atrasados:'Atrasados',remarcados:'Datas remarcadas',consertos:'Consertos'}; $('title').textContent=titles[tab]; if(tab==='consertos')return renderConsertos(); let arr=filtered(); $('content').innerHTML=`<table><thead><tr><th>OS</th><th>Cliente(s)</th><th>Telefone</th><th>Prevista</th><th>Status</th><th>Ações</th></tr></thead><tbody>${arr.map(c=>`<tr><td>${c.pedido||''}</td><td>${pessoas(c).map(p=>`${p.entregue?'✅':'⏳'} ${p.nome}`).join('<br>')}</td><td>${c.telefone||''}</td><td>${c.data_prevista||''}</td><td><span class="pill">${status(c)}</span></td><td><div class="actions"><button class="btn gray" onclick="openCliente('${c.id}')">Editar</button><button class="btn secondary" onclick="copiarEntrega('${c.id}')">Copiar</button><button class="btn gray" onclick="whats('${c.id}')">WhatsApp</button>${c.sem_armacao?`<button class="btn ok" onclick="mark('${c.id}','sem_armacao',false)">Armação recebida</button>`:''}${c.falta_exame?`<button class="btn ok" onclick="mark('${c.id}','falta_exame',false)">Exame recebido</button>`:''}${status(c)==='Atrasado'?`<button class="btn warn" onclick="remarcar('${c.id}')">Remarcar</button>`:''}<button class="btn danger" onclick="delCliente('${c.id}')">Excluir</button></div></td></tr>`).join('')}</tbody></table>`}
function renderConsertos(){ $('content').innerHTML=`<div class="list">${consertos.map(c=>`<div class="item"><div><b>${c.cliente}</b><div>${c.servico||''}</div><div class="small">${c.telefone||''} • ${c.previsao_entrega||''} • ${money(c.valor)}</div></div><span class="pill">${c.status}</span></div>`).join('')||'Nenhum conserto.'}</div>`}
function openCliente(id){$('clienteDlg').showModal();$('cid').value=id||'';$('data_venda').value=today();$('telefone').value='';$('endereco').value='';$('laboratorio').value='Henrique';$('data_prevista').value='';$('valor_total').value='';$('entrada').value='';$('restante').value='';$('sem_armacao').checked=false;$('falta_exame').checked=false;$('observacoes').value='';$('pessoasBox').innerHTML=''; if(id){let c=clientes.find(x=>x.id===id);$('data_venda').value=c.data_venda||today();$('telefone').value=c.telefone||'';$('endereco').value=c.endereco||'';$('laboratorio').value=c.laboratorio||'Henrique';$('data_prevista').value=c.data_prevista||'';$('valor_total').value=c.valor_total||'';$('entrada').value=c.entrada||'';$('restante').value=c.restante||'';$('sem_armacao').checked=!!c.sem_armacao;$('falta_exame').checked=!!c.falta_exame;$('observacoes').value=obsLivre(c); pessoas(c).forEach(p=>addPessoa(p.nome,p.entregue));} else addPessoa();}
function addPessoa(nome='',entregue=false){let d=document.createElement('div');d.className='person';d.innerHTML=`<div class="formgrid"><div><label>Nome completo</label><input class="p_nome" value="${nome||''}"></div><label style="align-self:end"><input type="checkbox" class="p_entregue" ${entregue?'checked':''} style="width:auto"> Entregue</label><button class="btn danger" type="button" onclick="this.closest('.person').remove()">Remover</button></div>`;$('pessoasBox').appendChild(d)}
function calcRestante(){$('restante').value=(Number($('valor_total').value||0)-Number($('entrada').value||0)).toFixed(2)}
async function salvarCliente(){let ps=[...document.querySelectorAll('.person')].map(d=>({nome:d.querySelector('.p_nome').value.trim(),entregue:d.querySelector('.p_entregue').checked})).filter(p=>p.nome); if(!ps.length)return toast('Informe pelo menos um nome'); let obj={pedido:$('cid').value?undefined:'OS-'+Date.now().toString().slice(-6),data_venda:$('data_venda').value,nome:ps.map(p=>p.nome).join(' / '),telefone:$('telefone').value,endereco:$('endereco').value,laboratorio:$('laboratorio').value,data_prevista:$('data_prevista').value||null,valor_total:Number($('valor_total').value||0),entrada:Number($('entrada').value||0),restante:Number($('restante').value||0),sem_armacao:$('sem_armacao').checked,falta_exame:$('falta_exame').checked,entregue:ps.every(p=>p.entregue),status:ps.every(p=>p.entregue)?'Entregue':'Em aberto',observacoes:JSON.stringify({obs:$('observacoes').value,pessoas:ps})}; let id=$('cid').value; let r=id?await sb.from('clientes').update(obj).eq('id',id):await sb.from('clientes').insert(obj); if(r.error)return alert(r.error.message); $('clienteDlg').close(); await load(); toast('Salvo!')}
async function mark(id,field,val){await sb.from('clientes').update({[field]:val}).eq('id',id);load()}
async function delCliente(id){if(confirm('Excluir cliente?')){await sb.from('clientes').delete().eq('id',id);load()}}
function copiarEntrega(id){let c=clientes.find(x=>x.id===id);let ps=pessoas(c).map(p=>'• '+p.nome).join('\n');let txt=`Nome(s):\n${ps}\n\nTelefone:\n${c.telefone||''}\n\nEndereço:\n${c.endereco||''}`;navigator.clipboard.writeText(txt);toast('Dados copiados!')}
function whats(id){let c=clientes.find(x=>x.id===id);let tel=(c.telefone||'').replace(/\D/g,'');if(!tel)return toast('Sem telefone');window.open('https://wa.me/55'+tel,'_blank')}
async function remarcar(id){let nova=prompt('Nova data prevista (AAAA-MM-DD):'); if(!nova)return; let motivo=prompt('Motivo da remarcação:')||''; await sb.from('clientes').update({data_remarcada:nova,motivo_remarcacao:motivo,data_prevista:nova}).eq('id',id);load()}
function openConserto(){consertoDlg.showModal()}
async function salvarConserto(){let obj={cliente:$('c_cliente').value,telefone:$('c_telefone').value,servico:$('c_servico').value,valor:Number($('c_valor').value||0),previsao_entrega:$('c_previsao').value||null,status:$('c_status').value,observacoes:$('c_obs').value};let r=await sb.from('consertos').insert(obj);if(r.error)return alert(r.error.message);consertoDlg.close();load();toast('Conserto salvo!')}
load();
</script>
</body></html>

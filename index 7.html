<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ótica Lumière ERP</title>
<style>
:root{--bg:#fff7fa;--card:#fff;--text:#2c2230;--muted:#7b6a77;--rose:#c47f8f;--rose2:#f2d7df;--gold:#b9904d;--danger:#c0392b;--ok:#218c5a;--warn:#b7791f;--blue:#2c6fb7;--shadow:0 10px 28px rgba(55,35,45,.10);--radius:18px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(180deg,#fff7fa,#f7edf1);color:var(--text)}header{position:sticky;top:0;z-index:5;background:rgba(255,247,250,.92);backdrop-filter:blur(12px);border-bottom:1px solid #ead5dc;padding:14px 16px}header .top{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:1180px;margin:auto}.brand{display:flex;gap:10px;align-items:center}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--rose),#f5dce3);display:grid;place-items:center;color:white;font-weight:800;box-shadow:var(--shadow)}h1{font-size:18px;margin:0}.sub{font-size:12px;color:var(--muted)}main{max-width:1180px;margin:0 auto;padding:16px}.tabs{display:flex;gap:8px;overflow:auto;padding:8px 0 14px}.tab{border:1px solid #ead5dc;background:#fff;border-radius:999px;padding:10px 13px;white-space:nowrap;color:var(--text);font-weight:650}.tab.active{background:var(--rose);color:#fff;border-color:var(--rose)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:var(--card);border:1px solid #efdee4;border-radius:var(--radius);padding:15px;box-shadow:var(--shadow)}.metric .label{font-size:12px;color:var(--muted);font-weight:700}.metric .value{font-size:26px;font-weight:850;margin-top:8px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 14px}input,select,textarea{width:100%;border:1px solid #e6cfd7;border-radius:14px;padding:12px;background:#fff;color:var(--text);font-size:15px}textarea{min-height:82px}.btn{border:none;border-radius:14px;padding:12px 14px;background:var(--rose);color:#fff;font-weight:800;box-shadow:0 8px 18px rgba(196,127,143,.25)}.btn.secondary{background:#fff;color:var(--text);border:1px solid #e6cfd7;box-shadow:none}.btn.danger{background:var(--danger)}.btn.ok{background:var(--ok)}.btn.warn{background:var(--warn)}.btn.small{padding:8px 10px;font-size:13px;border-radius:11px}.section{display:none}.section.active{display:block}.list{display:grid;gap:10px}.item{background:#fff;border:1px solid #efdee4;border-radius:18px;padding:14px;box-shadow:var(--shadow)}.itemHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.title{font-weight:850}.meta{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.45}.badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:800;background:#f5e4ea;color:#794858}.badge.ok{background:#dff5ea;color:#17623e}.badge.warn{background:#fff0d0;color:#7d4d09}.badge.danger{background:#ffe1dd;color:#9b2418}.badge.blue{background:#e0efff;color:#19528c}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.modal{position:fixed;inset:0;background:rgba(20,10,18,.45);display:none;align-items:flex-end;z-index:10}.modal.open{display:flex}.sheet{background:#fff;width:100%;max-height:92vh;overflow:auto;border-radius:24px 24px 0 0;padding:18px;box-shadow:0 -10px 34px rgba(0,0,0,.18)}.formGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}.money{font-variant-numeric:tabular-nums}.empty{text-align:center;color:var(--muted);padding:30px}.toast{position:fixed;left:16px;right:16px;bottom:18px;background:#2c2230;color:white;padding:12px 14px;border-radius:16px;display:none;z-index:20;text-align:center}.toast.show{display:block}.pillRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.note{font-size:13px;color:var(--muted);line-height:1.45}.dangerText{color:var(--danger)}@media(max-width:820px){.grid{grid-template-columns:repeat(2,1fr)}.formGrid{grid-template-columns:1fr}.sheet{max-height:95vh}.itemHead{flex-direction:column}.toolbar input{min-width:100%}}@media(max-width:420px){main{padding:12px}.grid{grid-template-columns:1fr 1fr}.metric .value{font-size:22px}.card{padding:12px}.tab{padding:9px 11px;font-size:13px}}
</style>
</head>
<body>
<header><div class="top"><div class="brand"><div class="logo">OL</div><div><h1>Ótica Lumière ERP</h1><div class="sub">Clientes • Laboratório • Prazos • Consertos</div></div></div><button class="btn small secondary" onclick="carregarTudo()">Atualizar</button></div></header>
<main>
<div class="tabs" id="tabs"></div>
<section id="dashboard" class="section active"><div class="grid" id="metrics"></div><div class="card" style="margin-top:14px"><b>Pesquisa rápida</b><div class="toolbar"><input id="globalSearch" placeholder="Buscar por nome, telefone ou pedido" oninput="renderClientes()"></div><div id="quickResults" class="list"></div></div></section>
<section id="clientes" class="section"><div class="toolbar"><button class="btn" onclick="abrirCliente()">+ Novo cliente</button><input id="searchClientes" placeholder="Buscar cliente" oninput="renderClientes()"></div><div id="clientesList" class="list"></div></section>
<section id="laboratorio" class="section"><div id="labList" class="list"></div></section>
<section id="semarmacao" class="section"><div id="semArmacaoList" class="list"></div></section>
<section id="faltaexame" class="section"><div id="faltaExameList" class="list"></div></section>
<section id="prazos" class="section"><div class="card"><b>Vencendo hoje</b><div id="hojeList" class="list" style="margin-top:10px"></div></div><div class="card" style="margin-top:12px"><b>Atrasados</b><div id="atrasadosList" class="list" style="margin-top:10px"></div></div><div class="card" style="margin-top:12px"><b>Datas remarcadas</b><div id="remarcadosList" class="list" style="margin-top:10px"></div></div></section>
<section id="consertos" class="section"><div class="toolbar"><button class="btn" onclick="abrirConserto()">+ Conserto</button></div><div id="consertosList" class="list"></div></section>
<section id="financeiro" class="section"><div id="financeiroList" class="list"></div></section>
</main>
<div class="modal" id="modal"><div class="sheet"><div id="modalContent"></div></div></div><div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://mjwttqyvrwztpionkoyh.supabase.co';
const SUPABASE_KEY='sb_publishable__ubkt2h3nY2VyXu7xRvAuw_9EtuZbfl';
const headers={apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',Prefer:'return=representation'};
let clientes=[],consertos=[];
const tabs=[['dashboard','Dashboard'],['clientes','Clientes'],['laboratorio','Laboratório'],['semarmacao','Sem armação'],['faltaexame','Falta exame'],['prazos','Prazos'],['consertos','Consertos'],['financeiro','Financeiro']];
function $(id){return document.getElementById(id)}
function toast(msg){$('toast').textContent=msg;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2300)}
function hoje(){return new Date().toISOString().slice(0,10)}
function brDate(d){if(!d)return '-'; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function pedidoAuto(){return 'PED-'+new Date().getFullYear()+'-'+String((clientes.length||0)+1).padStart(5,'0')}
function calcRestante(total,entrada){return Math.max(0,Number(total||0)-Number(entrada||0))}
function showTab(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));renderAll()}
function renderTabs(){ $('tabs').innerHTML=tabs.map(t=>`<button class="tab ${t[0]=='dashboard'?'active':''}" data-id="${t[0]}" onclick="showTab('${t[0]}')">${t[1]}</button>`).join('') }
async function api(table,method='GET',body=null,query=''){let r=await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`,{method,headers,body:body?JSON.stringify(body):null}); if(!r.ok){let e=await r.text();throw new Error(e)} return r.status===204?[]:await r.json()}
async function carregarTudo(){try{clientes=await api('clientes','GET',null,'?select=*&order=criado_em.desc');consertos=await api('consertos','GET',null,'?select=*&order=criado_em.desc');renderAll();toast('Dados atualizados')}catch(e){toast('Erro no Supabase. Confira as políticas RLS.');console.error(e)}}
async function salvarCliente(ev,id){ev.preventDefault();const f=new FormData(ev.target);const total=Number(f.get('valor_total')||0),entrada=Number(f.get('entrada')||0);const data={pedido:f.get('pedido')||pedidoAuto(),data_venda:f.get('data_venda')||hoje(),nome:f.get('nome'),telefone:f.get('telefone'),endereco:f.get('endereco'),observacoes:f.get('observacoes'),laboratorio:f.get('laboratorio'),status:f.get('status'),valor_total:total,entrada:entrada,restante:calcRestante(total,entrada),sem_armacao:f.get('sem_armacao')==='on',falta_exame:f.get('falta_exame')==='on',data_prevista:f.get('data_prevista')||null,entregue:f.get('entregue')==='on'};try{if(id){await api('clientes','PATCH',data,`?id=eq.${id}`)}else{await api('clientes','POST',data)}fecharModal();await carregarTudo();toast('Cliente salvo')}catch(e){toast('Erro ao salvar cliente');console.error(e)}}
async function atualizarCliente(id,data){try{await api('clientes','PATCH',data,`?id=eq.${id}`);await carregarTudo();toast('Atualizado')}catch(e){toast('Erro ao atualizar');console.error(e)}}
async function excluirCliente(id){if(!confirm('Excluir este cliente?'))return;await api('clientes','DELETE',null,`?id=eq.${id}`);await carregarTudo();toast('Excluído')}
function abrirCliente(c={}){const id=c.id||'';$('modalContent').innerHTML=`<h2>${id?'Editar cliente':'Novo cliente'}</h2><form onsubmit="salvarCliente(event,'${id}')" class="formGrid"><label>Pedido<input name="pedido" value="${c.pedido||pedidoAuto()}"></label><label>Data da venda<input type="date" name="data_venda" value="${c.data_venda||hoje()}"></label><label class="full">Nome do cliente / nomes do pedido<input name="nome" required value="${c.nome||''}" placeholder="Ex: João / Maria / Pedro"></label><label>Telefone/WhatsApp<input name="telefone" value="${c.telefone||''}"></label><label>Laboratório<select name="laboratorio"><option></option>${['Henrique','Optec','Magno','Casa','Outro'].map(x=>`<option ${c.laboratorio==x?'selected':''}>${x}</option>`).join('')}</select></label><label>Data prevista<input type="date" name="data_prevista" value="${c.data_prevista||''}"></label><label>Status<select name="status">${['Em aberto','Em laboratório','Pronto','Entregue','Cancelado'].map(x=>`<option ${c.status==x?'selected':''}>${x}</option>`).join('')}</select></label><label>Valor total<input type="number" step="0.01" name="valor_total" value="${c.valor_total||0}"></label><label>Entrada<input type="number" step="0.01" name="entrada" value="${c.entrada||0}"></label><label class="full">Endereço<input name="endereco" value="${c.endereco||''}"></label><label class="full">Observações<textarea name="observacoes">${c.observacoes||''}</textarea></label><label><input type="checkbox" name="sem_armacao" ${c.sem_armacao?'checked':''}> Sem armação</label><label><input type="checkbox" name="falta_exame" ${c.falta_exame?'checked':''}> Falta exame</label><label><input type="checkbox" name="entregue" ${c.entregue?'checked':''}> Entregue</label><div class="full actions"><button class="btn">Salvar</button><button type="button" class="btn secondary" onclick="fecharModal()">Cancelar</button></div></form>`;abrirModal()}
function cardCliente(c){const atrasado=c.data_prevista && c.data_prevista<hoje() && !c.entregue;const vence=c.data_prevista===hoje()&&!c.entregue;return `<div class="item"><div class="itemHead"><div><div class="title">${c.nome}</div><div class="meta">${c.pedido||'-'} • Venda: ${brDate(c.data_venda)} • Tel: ${c.telefone||'-'}<br>Lab: ${c.laboratorio||'-'} • Previsto: ${brDate(c.data_prevista)} • Restante: <span class="money">${money(c.restante)}</span></div><div class="pillRow"><span class="badge ${c.entregue?'ok':atrasado?'danger':vence?'warn':'blue'}">${c.entregue?'Entregue':atrasado?'Atrasado':vence?'Vence hoje':c.status||'Em aberto'}</span>${c.sem_armacao?'<span class="badge warn">Sem armação</span>':''}${c.falta_exame?'<span class="badge warn">Falta exame</span>':''}${c.data_remarcada?'<span class="badge blue">Remarcado</span>':''}</div></div></div><div class="actions"><button class="btn small secondary" onclick='abrirCliente(${JSON.stringify(c).replaceAll("'","&#39;")})'>Editar</button><button class="btn small ok" onclick="atualizarCliente('${c.id}',{entregue:true,status:'Entregue'})">Entregue</button><button class="btn small warn" onclick="abrirRemarcar('${c.id}')">Remarcar</button><button class="btn small danger" onclick="excluirCliente('${c.id}')">Excluir</button></div></div>`}
function renderClientes(){let q=($('searchClientes')?.value||$('globalSearch')?.value||'').toLowerCase();let arr=clientes.filter(c=>[c.nome,c.telefone,c.pedido].join(' ').toLowerCase().includes(q));let html=arr.length?arr.map(cardCliente).join(''):'<div class="empty">Nenhum cliente encontrado</div>';$('clientesList').innerHTML=html;$('quickResults').innerHTML=html}
function renderDashboard(){let h=hoje();let metrics=[['Vendas do dia',money(clientes.filter(c=>c.data_venda===h).reduce((s,c)=>s+Number(c.valor_total||0),0))],['Vendas do mês',money(clientes.filter(c=>(c.data_venda||'').slice(0,7)===h.slice(0,7)).reduce((s,c)=>s+Number(c.valor_total||0),0))],['Em laboratório',clientes.filter(c=>c.status==='Em laboratório').length],['Prontos',clientes.filter(c=>c.status==='Pronto').length],['Vencendo hoje',clientes.filter(c=>c.data_prevista===h&&!c.entregue).length],['Atrasados',clientes.filter(c=>c.data_prevista&&c.data_prevista<h&&!c.entregue).length],['Sem armação',clientes.filter(c=>c.sem_armacao).length],['Falta exame',clientes.filter(c=>c.falta_exame).length],['Consertos',consertos.filter(c=>c.status!=='Entregue').length],['A receber',money(clientes.reduce((s,c)=>s+Number(c.restante||0),0)+consertos.reduce((s,c)=>s+Number(c.restante||0),0))]];$('metrics').innerHTML=metrics.map(m=>`<div class="card metric"><div class="label">${m[0]}</div><div class="value">${m[1]}</div></div>`).join('')}
function renderLab(){let arr=clientes.filter(c=>c.laboratorio&&!c.entregue);$('labList').innerHTML=arr.length?arr.map(cardCliente).join(''):'<div class="empty">Nenhum pedido em laboratório</div>'}
function renderSemArmacao(){let arr=clientes.filter(c=>c.sem_armacao);$('semArmacaoList').innerHTML=arr.length?arr.map(c=>cardCliente(c).replace('</div></div>','<button class="btn small ok" onclick="atualizarCliente(\''+c.id+'\',{sem_armacao:false})">Armação recebida</button></div></div>')).join(''):'<div class="empty">Nenhum cliente sem armação</div>'}
function renderFaltaExame(){let arr=clientes.filter(c=>c.falta_exame);$('faltaExameList').innerHTML=arr.length?arr.map(c=>cardCliente(c).replace('</div></div>','<button class="btn small ok" onclick="atualizarCliente(\''+c.id+'\',{falta_exame:false})">Exame recebido</button></div></div>')).join(''):'<div class="empty">Nenhum cliente com falta de exame</div>'}
function renderPrazos(){let h=hoje();$('hojeList').innerHTML=(clientes.filter(c=>c.data_prevista===h&&!c.entregue).map(cardCliente).join(''))||'<div class="empty">Nenhum vencendo hoje</div>';$('atrasadosList').innerHTML=(clientes.filter(c=>c.data_prevista&&c.data_prevista<h&&!c.entregue).map(cardCliente).join(''))||'<div class="empty">Nenhum atrasado</div>';$('remarcadosList').innerHTML=(clientes.filter(c=>c.data_remarcada).map(cardCliente).join(''))||'<div class="empty">Nenhum remarcado</div>'}
function abrirRemarcar(id){$('modalContent').innerHTML=`<h2>Remarcar prazo</h2><form onsubmit="salvarRemarcacao(event,'${id}')" class="formGrid"><label>Nova data<input type="date" name="data" required></label><label class="full">Motivo/observação<textarea name="motivo"></textarea></label><div class="full actions"><button class="btn">Salvar remarcação</button><button type="button" class="btn secondary" onclick="fecharModal()">Cancelar</button></div></form>`;abrirModal()}
async function salvarRemarcacao(ev,id){ev.preventDefault();const f=new FormData(ev.target);await atualizarCliente(id,{data_remarcada:f.get('data'),data_prevista:f.get('data'),motivo_remarcacao:f.get('motivo')});fecharModal()}
function abrirConserto(c={}){const id=c.id||'';$('modalContent').innerHTML=`<h2>${id?'Editar conserto':'Novo conserto'}</h2><form onsubmit="salvarConserto(event,'${id}')" class="formGrid"><label>Data entrada<input type="date" name="data_entrada" value="${c.data_entrada||hoje()}"></label><label>Previsão entrega<input type="date" name="previsao_entrega" value="${c.previsao_entrega||''}"></label><label>Cliente<input name="cliente" required value="${c.cliente||''}"></label><label>Telefone<input name="telefone" value="${c.telefone||''}"></label><label class="full">Serviço<input name="servico" value="${c.servico||''}" placeholder="Solda, plaqueta, parafuso..."></label><label>Valor<input type="number" step="0.01" name="valor" value="${c.valor||0}"></label><label>Entrada<input type="number" step="0.01" name="entrada" value="${c.entrada||0}"></label><label>Status<select name="status">${['Recebido','Em conserto','Aguardando peça','Pronto','Entregue'].map(x=>`<option ${c.status==x?'selected':''}>${x}</option>`).join('')}</select></label><label class="full">Observações<textarea name="observacoes">${c.observacoes||''}</textarea></label><div class="full actions"><button class="btn">Salvar</button><button type="button" class="btn secondary" onclick="fecharModal()">Cancelar</button></div></form>`;abrirModal()}
async function salvarConserto(ev,id){ev.preventDefault();const f=new FormData(ev.target);const valor=Number(f.get('valor')||0),entrada=Number(f.get('entrada')||0);const data={data_entrada:f.get('data_entrada')||hoje(),cliente:f.get('cliente'),telefone:f.get('telefone'),servico:f.get('servico'),valor,entrada,restante:calcRestante(valor,entrada),previsao_entrega:f.get('previsao_entrega')||null,status:f.get('status'),observacoes:f.get('observacoes')};try{if(id){await api('consertos','PATCH',data,`?id=eq.${id}`)}else await api('consertos','POST',data);fecharModal();await carregarTudo();toast('Conserto salvo')}catch(e){toast('Erro ao salvar conserto');console.error(e)}}
async function excluirConserto(id){if(!confirm('Excluir conserto?'))return;await api('consertos','DELETE',null,`?id=eq.${id}`);await carregarTudo();toast('Excluído')}
function cardConserto(c){return `<div class="item"><div class="title">${c.cliente}</div><div class="meta">Entrada: ${brDate(c.data_entrada)} • Previsão: ${brDate(c.previsao_entrega)} • Tel: ${c.telefone||'-'}<br>Serviço: ${c.servico||'-'} • Restante: ${money(c.restante)}</div><div class="pillRow"><span class="badge ${c.status==='Entregue'?'ok':c.status==='Pronto'?'warn':'blue'}">${c.status}</span></div><div class="actions"><button class="btn small secondary" onclick='abrirConserto(${JSON.stringify(c).replaceAll("'","&#39;")})'>Editar</button><button class="btn small ok" onclick="api('consertos','PATCH',{status:'Entregue',restante:0},'?id=eq.${c.id}').then(carregarTudo)">Entregue</button><button class="btn small danger" onclick="excluirConserto('${c.id}')">Excluir</button></div></div>`}
function renderConsertos(){$('consertosList').innerHTML=consertos.length?consertos.map(cardConserto).join(''):'<div class="empty">Nenhum conserto cadastrado</div>'}
function renderFinanceiro(){let arr=[...clientes.map(c=>({tipo:'Pedido',nome:c.nome,ref:c.pedido,restante:c.restante,total:c.valor_total})),...consertos.map(c=>({tipo:'Conserto',nome:c.cliente,ref:c.servico,restante:c.restante,total:c.valor}))];$('financeiroList').innerHTML=arr.length?arr.map(x=>`<div class="item"><div class="title">${x.tipo}: ${x.nome}</div><div class="meta">${x.ref||'-'} • Total: ${money(x.total)} • Restante: <b>${money(x.restante)}</b></div></div>`).join(''):'<div class="empty">Sem dados financeiros</div>'}
function renderAll(){renderDashboard();renderClientes();renderLab();renderSemArmacao();renderFaltaExame();renderPrazos();renderConsertos();renderFinanceiro()}
function abrirModal(){$('modal').classList.add('open')}function fecharModal(){$('modal').classList.remove('open')}$('modal').addEventListener('click',e=>{if(e.target.id==='modal')fecharModal()});
renderTabs();carregarTudo();
</script>
</body>
</html>

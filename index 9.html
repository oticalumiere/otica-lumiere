<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ótica Lumière ERP</title>
<style>
:root{--rose:#cc5b8b;--rose2:#f7e7ef;--bg:#fafafa;--text:#151525;--muted:#76768a;--card:#fff;--line:#ececf2;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626;--blue:#2563eb}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:18px 16px 14px}h1{font-size:30px;margin:0 0 16px;color:var(--rose);white-space:nowrap}.nav{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}.nav button,.pill{border:0;border-radius:22px;padding:12px 16px;font-weight:800;font-size:16px;background:#fff;color:#111;white-space:nowrap}.nav button.active{background:var(--rose2);color:var(--rose)}main{padding:18px 16px 90px;max-width:1000px;margin:auto}.topbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}input,select,textarea{width:100%;border:1px solid #ddd;border-radius:16px;padding:13px 14px;font-size:16px;background:#fff;color:#111}textarea{min-height:80px}.search{flex:1;min-width:190px}.btn{border:0;border-radius:18px;background:var(--rose);color:#fff;font-weight:900;font-size:16px;padding:13px 18px}.btn.secondary{background:#f1f1f4;color:#111}.btn.small{font-size:13px;padding:8px 10px;border-radius:12px}.btn.ok{background:var(--ok)}.btn.bad{background:var(--bad)}.btn.warn{background:var(--warn)}h2{font-size:34px;margin:18px 0 4px}.sub{color:var(--muted);margin:0 0 20px;font-size:17px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 6px 18px rgba(0,0,0,.04)}.metric b{display:block;font-size:30px;margin-bottom:4px}.metric span{font-weight:800;font-size:16px}.list{display:grid;gap:12px}.row{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px}.row h3{margin:0 0 6px;font-size:18px}.meta{color:var(--muted);font-size:14px;line-height:1.45}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.badge{display:inline-block;border-radius:99px;padding:5px 9px;font-size:12px;font-weight:800;background:#eee;margin:3px 3px 0 0}.badge.ok{background:#dcfce7;color:#166534}.badge.warn{background:#fef3c7;color:#92400e}.badge.bad{background:#fee2e2;color:#991b1b}.badge.blue{background:#dbeafe;color:#1d4ed8}.pessoas{display:grid;gap:6px;margin:9px 0}.pessoa{display:flex;gap:8px;align-items:center;background:#f8f8fb;border:1px solid var(--line);border-radius:14px;padding:8px}.pessoa span{flex:1;font-weight:800}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;display:none;align-items:flex-end}.modal.open{display:flex}.sheet{background:#fff;border-radius:26px 26px 0 0;padding:18px;width:100%;max-height:92vh;overflow:auto}.formgrid{display:grid;grid-template-columns:1fr;gap:12px}.label{font-size:13px;font-weight:800;color:#555;margin-bottom:4px}.field{display:grid;gap:4px}.toast{position:fixed;left:16px;right:16px;bottom:18px;background:#111;color:#fff;padding:14px 16px;border-radius:18px;display:none;z-index:200}.toast.show{display:block}.statusbar{font-size:13px;color:var(--muted);margin:8px 0 0}.empty{text-align:center;color:var(--muted);padding:28px}.wide{grid-column:1/-1}.person-input{display:flex;gap:8px}.person-input input{flex:1}@media(min-width:760px){header{padding-left:32px;padding-right:32px}main{padding-left:32px;padding-right:32px}.grid{grid-template-columns:repeat(4,1fr)}.formgrid{grid-template-columns:repeat(2,1fr)}.sheet{max-width:760px;margin:auto;border-radius:26px}.modal{align-items:center}.wide{grid-column:1/-1}}
</style>
</head>
<body>
<header><h1>👓 Ótica Lumière</h1><div id="nav" class="nav"></div></header>
<main>
<div class="topbar"><input id="search" class="search" placeholder="Buscar por nome, telefone ou pedido" oninput="render()"><button class="btn" onclick="openCliente()">+ Novo cliente</button><button class="btn secondary" onclick="openConserto()">+ Conserto</button></div>
<div id="syncStatus" class="statusbar">Carregando...</div><div id="view"></div>
</main>
<div id="modal" class="modal"><div class="sheet"><div id="modalContent"></div></div></div><div id="toast" class="toast"></div>
<script>
const SUPABASE_URL='https://mjwttqyvrwztpionkoyh.supabase.co';
const SUPABASE_KEY='sb_publishable__ubkt2h3nY2VyXu7xRvAuw_9EtuZbfl';
const $=s=>document.querySelector(s);
let page='dashboard', clientes=[], consertos=[];
const tabs=[['dashboard','🏠 Dashboard'],['clientes','👥 Clientes'],['laboratorio','🧪 Laboratório'],['sem_armacao','👓 Sem armação'],['falta_exame','📄 Falta exame'],['consertos','🔧 Consertos'],['atrasados','⏰ Atrasados'],['remarcados','📅 Remarcados'],['financeiro','💰 Financeiro']];
function h(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function today(){return new Date().toISOString().slice(0,10)}
function br(d){return d?String(d).split('-').reverse().join('/'):''}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function toast(t){const el=$('#toast'); el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500)}
async function api(table,method='GET',body=null,query=''){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`,{method,headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',Prefer:'return=representation'},body:body?JSON.stringify(body):null});
  if(!res.ok){throw new Error(await res.text())} if(method==='DELETE')return null; const text=await res.text(); return text?JSON.parse(text):null;
}
function meta(c){
  const raw=c.observacoes||'';
  if(raw.startsWith('OTICA_META:')){try{return JSON.parse(raw.replace('OTICA_META:',''))}catch(e){}}
  const nomes=String(c.nome||'').split(/\s*\/\s*|\n|,/).map(x=>x.trim()).filter(Boolean);
  return {obs:raw,pessoas:(nomes.length?nomes:[c.nome||'']).filter(Boolean).map(n=>({nome:n,entregue:!!c.entregue}))};
}
function pack(obs,pessoas){return 'OTICA_META:'+JSON.stringify({obs:obs||'',pessoas:pessoas||[]})}
function nomes(c){const m=meta(c); return (m.pessoas||[]).map(p=>p.nome).filter(Boolean)}
function allEntregues(c){const ps=meta(c).pessoas||[]; return ps.length>0 && ps.every(p=>p.entregue)}
async function load(){try{$('#syncStatus').textContent='Sincronizando...'; clientes=await api('clientes','GET',null,'?select=*&order=criado_em.desc')||[]; consertos=await api('consertos','GET',null,'?select=*&order=criado_em.desc')||[]; $('#syncStatus').textContent='☁️ Online · dados salvos no Supabase'}catch(e){$('#syncStatus').textContent='⚠️ Erro ao conectar ao Supabase'; toast('Erro ao conectar ao Supabase')}render()}
function nav(){$('#nav').innerHTML=tabs.map(t=>`<button class="${page===t[0]?'active':''}" onclick="page='${t[0]}';render()">${t[1]}</button>`).join('')}
function filtered(list=clientes){let q=$('#search')?.value?.toLowerCase()||''; return list.filter(c=>[nomes(c).join(' '),c.telefone,c.pedido,c.laboratorio,c.status,meta(c).obs].join(' ').toLowerCase().includes(q))}
function calc(){const t=today(), mes=t.slice(0,7); return {dia:clientes.filter(c=>c.data_venda===t).reduce((s,c)=>s+Number(c.valor_total||0),0),mes:clientes.filter(c=>(c.data_venda||'').startsWith(mes)).reduce((s,c)=>s+Number(c.valor_total||0),0),lab:clientes.filter(c=>c.status==='Em laboratório').length,prontos:clientes.filter(c=>c.status==='Pronto').length,hoje:clientes.filter(c=>!allEntregues(c)&&c.data_prevista===t).length,atrasados:clientes.filter(c=>!allEntregues(c)&&c.data_prevista&&c.data_prevista<t&&!c.data_remarcada).length,rem:clientes.filter(c=>c.data_remarcada).length,sem:clientes.filter(c=>c.sem_armacao).length,exame:clientes.filter(c=>c.falta_exame).length,restante:clientes.reduce((s,c)=>s+Number(c.restante||0),0)}}
function dashboard(){let c=calc(); const cards=[['Vendas do dia',money(c.dia)],['Vendas do mês',money(c.mes)],['Em laboratório',c.lab],['Prontos',c.prontos],['Vencendo hoje',c.hoje],['Atrasados',c.atrasados],['Datas remarcadas',c.rem],['Sem armação',c.sem],['Falta exame',c.exame],['A receber',money(c.restante)]];return `<h2>Dashboard</h2><p class="sub">Sistema da Ótica Lumière</p><div class="grid">${cards.map(x=>`<div class="card metric"><b>${x[1]}</b><span>${x[0]}</span></div>`).join('')}</div>`}
function badges(c){let b=''; if(c.laboratorio)b+=`<span class="badge blue">${h(c.laboratorio)}</span>`; if(c.status)b+=`<span class="badge ok">${h(c.status)}</span>`; if(c.sem_armacao)b+=`<span class="badge warn">Sem armação</span>`; if(c.falta_exame)b+=`<span class="badge warn">Falta exame</span>`; if(c.data_remarcada)b+=`<span class="badge blue">Remarcado ${br(c.data_remarcada)}</span>`; if(!allEntregues(c)&&c.data_prevista&&c.data_prevista<today()&&!c.data_remarcada)b+=`<span class="badge bad">Atrasado</span>`; if(allEntregues(c))b+=`<span class="badge ok">Todos entregues</span>`; return b}
function pessoasHtml(c){const ps=meta(c).pessoas||[]; if(!ps.length)return ''; return `<div class="pessoas">${ps.map((p,i)=>`<div class="pessoa"><span>${p.entregue?'✅':'⏳'} ${h(p.nome)}</span><button class="btn small ${p.entregue?'secondary':'ok'}" onclick="togglePessoa('${c.id}',${i})">${p.entregue?'Voltar':'Entregar'}</button></div>`).join('')}</div>`}
function clienteRow(c){const m=meta(c), ps=nomes(c), title=ps.length?ps.join(' / '):(c.nome||'Sem nome'); return `<div class="row"><h3>${h(title)} ${c.pedido?`· Pedido ${h(c.pedido)}`:''}</h3><div>${badges(c)}</div>${pessoasHtml(c)}<div class="meta">Tel: ${h(c.telefone||'-')} · Venda: ${br(c.data_venda)||'-'} · Previsão: ${br(c.data_prevista)||'-'}<br>Valor: ${money(c.valor_total)} · Entrada: ${money(c.entrada)} · Restante: ${money(c.restante)}<br>${h(c.endereco||'')} ${m.obs?'<br>Obs: '+h(m.obs):''}</div><div class="actions"><button class="btn small" onclick="openCliente('${c.id}')">Editar</button><button class="btn small ok" onclick="setStatus('${c.id}','Pronto')">Pronto</button><button class="btn small ok" onclick="entregarTodos('${c.id}')">Entregar todos</button><button class="btn small warn" onclick="remarcar('${c.id}')">Remarcar</button><button class="btn small bad" onclick="delCliente('${c.id}')">Excluir</button></div></div>`}
function list(title,list){return `<h2>${title}</h2><p class="sub">${list.length} registro(s)</p><div class="list">${list.length?list.map(clienteRow).join(''):'<div class="empty">Nenhum registro.</div>'}</div>`}
function consertoRow(c){return `<div class="row"><h3>🔧 ${h(c.cliente)}</h3><span class="badge blue">${h(c.status||'Recebido')}</span><div class="meta">Tel: ${h(c.telefone||'-')} · Entrada: ${br(c.data_entrada)} · Previsão: ${br(c.previsao_entrega)||'-'}<br>Serviço: ${h(c.servico||'-')}<br>Valor: ${money(c.valor)} · Restante: ${money(c.restante)} ${c.observacoes?'<br>Obs: '+h(c.observacoes):''}</div><div class="actions"><button class="btn small" onclick="openConserto('${c.id}')">Editar</button><button class="btn small ok" onclick="setConsertoStatus('${c.id}','Entregue')">Entregue</button><button class="btn small bad" onclick="delConserto('${c.id}')">Excluir</button></div></div>`}
function render(){nav(); let base=filtered(), html=''; if(page==='dashboard')html=dashboard(); if(page==='clientes')html=list('Clientes',base); if(page==='laboratorio')html=list('Laboratório',base.filter(c=>c.status==='Em laboratório'||c.laboratorio)); if(page==='sem_armacao')html=list('Sem armação',base.filter(c=>c.sem_armacao)); if(page==='falta_exame')html=list('Falta exame',base.filter(c=>c.falta_exame)); if(page==='atrasados')html=list('Atrasados',base.filter(c=>!allEntregues(c)&&c.data_prevista&&c.data_prevista<today()&&!c.data_remarcada)); if(page==='remarcados')html=list('Datas remarcadas',base.filter(c=>c.data_remarcada)); if(page==='financeiro')html=list('Financeiro',base.filter(c=>Number(c.restante)>0)); if(page==='consertos')html=`<h2>Consertos</h2><p class="sub">${consertos.length} registro(s)</p><div class="list">${consertos.length?consertos.map(consertoRow).join(''):'<div class="empty">Nenhum conserto.</div>'}</div>`; $('#view').innerHTML=html}
function closeModal(){ $('#modal').classList.remove('open'); $('#modalContent').innerHTML='' }
function addPersonInput(v=''){const box=$('#personBox'); const row=document.createElement('div'); row.className='person-input'; row.innerHTML=`<input class="pessoa_nome" placeholder="Nome do cliente" value="${h(v)}"><button class="btn small bad" onclick="this.parentElement.remove()">X</button>`; box.appendChild(row)}
function collectPessoas(){return Array.from(document.querySelectorAll('.pessoa_nome')).map(i=>i.value.trim()).filter(Boolean).map(nome=>({nome,entregue:false}))}
function openCliente(id=null){const c=id?clientes.find(x=>x.id===id):{}; const m=meta(c||{}), ps=m.pessoas?.length?m.pessoas:[{nome:c?.nome||'',entregue:false}]; $('#modalContent').innerHTML=`<h2>${id?'Editar':'Novo'} cliente</h2><div class="formgrid"><div class="field wide"><span class="label">Clientes do pedido</span><div id="personBox"></div><button type="button" class="btn secondary" onclick="addPersonInput()">+ Adicionar outro nome</button></div><div class="field"><span class="label">Telefone</span><input id="f_tel" value="${h(c.telefone||'')}"></div><div class="field"><span class="label">Pedido</span><input id="f_pedido" value="${h(c.pedido||'')}"></div><div class="field"><span class="label">Data da venda</span><input id="f_venda" type="date" value="${c.data_venda||today()}"></div><div class="field"><span class="label">Laboratório</span><select id="f_lab"><option></option>${['Henrique','Optec','Magno','Casa'].map(x=>`<option ${c.laboratorio===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><span class="label">Status</span><select id="f_status">${['Em aberto','Em laboratório','Pronto','Entregue'].map(x=>`<option ${c.status===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><span class="label">Previsão de entrega</span><input id="f_prev" type="date" value="${c.data_prevista||''}"></div><div class="field"><span class="label">Valor total</span><input id="f_valor" type="number" step="0.01" value="${c.valor_total||''}"></div><div class="field"><span class="label">Entrada</span><input id="f_ent" type="number" step="0.01" value="${c.entrada||''}"></div><div class="field"><span class="label">Restante</span><input id="f_rest" type="number" step="0.01" value="${c.restante||''}"></div><label><input id="f_sem" type="checkbox" ${c.sem_armacao?'checked':''}> Sem armação</label><label><input id="f_exame" type="checkbox" ${c.falta_exame?'checked':''}> Falta exame</label><div class="field wide"><span class="label">Endereço</span><input id="f_end" value="${h(c.endereco||'')}"></div><div class="field wide"><span class="label">Observações</span><textarea id="f_obs">${h(m.obs||'')}</textarea></div></div><div class="actions"><button class="btn" onclick="saveCliente('${id||''}')">Salvar</button><button class="btn secondary" onclick="closeModal()">Cancelar</button></div>`; $('#modal').classList.add('open'); ps.forEach(p=>addPersonInput(p.nome))}
async function saveCliente(id){try{let valor=Number($('#f_valor').value||0), ent=Number($('#f_ent').value||0); let rest=$('#f_rest').value===''?valor-ent:Number($('#f_rest').value||0); let pessoas=collectPessoas(); if(!pessoas.length)return toast('Informe pelo menos um nome'); if(id){const antigo=clientes.find(x=>x.id===id), antigas=meta(antigo).pessoas||[]; pessoas=pessoas.map(p=>({nome:p.nome,entregue:!!(antigas.find(a=>a.nome===p.nome)?.entregue)}))} const all=pessoas.every(p=>p.entregue); const body={nome:pessoas.map(p=>p.nome).join(' / '),telefone:$('#f_tel').value,pedido:$('#f_pedido').value,data_venda:$('#f_venda').value||null,laboratorio:$('#f_lab').value,status:all?'Entregue':$('#f_status').value,data_prevista:$('#f_prev').value||null,valor_total:valor,entrada:ent,restante:rest,sem_armacao:$('#f_sem').checked,falta_exame:$('#f_exame').checked,endereco:$('#f_end').value,observacoes:pack($('#f_obs').value,pessoas),entregue:all}; if(id) await api('clientes','PATCH',body,'?id=eq.'+id); else await api('clientes','POST',body); closeModal(); toast('Cliente salvo'); await load()}catch(e){toast('Erro ao salvar cliente')}}
async function togglePessoa(id,i){const c=clientes.find(x=>x.id===id), m=meta(c); m.pessoas[i].entregue=!m.pessoas[i].entregue; const all=m.pessoas.every(p=>p.entregue); await api('clientes','PATCH',{observacoes:pack(m.obs,m.pessoas),entregue:all,status:all?'Entregue':c.status,restante:all?0:c.restante},'?id=eq.'+id); await load()}
async function setStatus(id,status){await api('clientes','PATCH',{status},'?id=eq.'+id); await load()} async function entregarTodos(id){const c=clientes.find(x=>x.id===id), m=meta(c); m.pessoas=(m.pessoas||[]).map(p=>({...p,entregue:true})); await api('clientes','PATCH',{status:'Entregue',entregue:true,restante:0,observacoes:pack(m.obs,m.pessoas)},'?id=eq.'+id); await load()} async function delCliente(id){if(confirm('Excluir cliente?')){await api('clientes','DELETE',null,'?id=eq.'+id);await load()}}
function remarcar(id){const nova=prompt('Nova data (AAAA-MM-DD):'); if(!nova)return; const motivo=prompt('Motivo da remarcação (opcional):')||''; api('clientes','PATCH',{data_remarcada:nova,motivo_remarcacao:motivo,data_prevista:nova},'?id=eq.'+id).then(load)}
function openConserto(id=null){const c=id?consertos.find(x=>x.id===id):{}; $('#modalContent').innerHTML=`<h2>${id?'Editar':'Novo'} conserto</h2><div class="formgrid"><div class="field"><span class="label">Cliente</span><input id="c_cliente" value="${h(c.cliente||'')}"></div><div class="field"><span class="label">Telefone</span><input id="c_tel" value="${h(c.telefone||'')}"></div><div class="field"><span class="label">Data entrada</span><input id="c_data" type="date" value="${c.data_entrada||today()}"></div><div class="field"><span class="label">Previsão</span><input id="c_prev" type="date" value="${c.previsao_entrega||''}"></div><div class="field"><span class="label">Valor</span><input id="c_valor" type="number" step="0.01" value="${c.valor||''}"></div><div class="field"><span class="label">Entrada</span><input id="c_ent" type="number" step="0.01" value="${c.entrada||''}"></div><div class="field"><span class="label">Restante</span><input id="c_rest" type="number" step="0.01" value="${c.restante||''}"></div><div class="field"><span class="label">Status</span><select id="c_status">${['Recebido','Em andamento','Pronto','Entregue'].map(x=>`<option ${c.status===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field wide"><span class="label">Serviço</span><input id="c_serv" value="${h(c.servico||'')}"></div><div class="field wide"><span class="label">Observações</span><textarea id="c_obs">${h(c.observacoes||'')}</textarea></div></div><div class="actions"><button class="btn" onclick="saveConserto('${id||''}')">Salvar</button><button class="btn secondary" onclick="closeModal()">Cancelar</button></div>`; $('#modal').classList.add('open')}
async function saveConserto(id){try{let valor=Number($('#c_valor').value||0), ent=Number($('#c_ent').value||0); let rest=$('#c_rest').value===''?valor-ent:Number($('#c_rest').value||0); const body={cliente:$('#c_cliente').value,telefone:$('#c_tel').value,data_entrada:$('#c_data').value||today(),previsao_entrega:$('#c_prev').value||null,valor,entrada:ent,restante:rest,status:$('#c_status').value,servico:$('#c_serv').value,observacoes:$('#c_obs').value}; if(!body.cliente)return toast('Informe o cliente'); if(id) await api('consertos','PATCH',body,'?id=eq.'+id); else await api('consertos','POST',body); closeModal(); toast('Conserto salvo'); await load()}catch(e){toast('Erro ao salvar conserto')}}
async function setConsertoStatus(id,status){await api('consertos','PATCH',{status,restante:status==='Entregue'?0:undefined},'?id=eq.'+id); await load()} async function delConserto(id){if(confirm('Excluir conserto?')){await api('consertos','DELETE',null,'?id=eq.'+id);await load()}}
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()}); load();
</script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ótica Lumière ERP</title>
<style>
:root{--rose:#d45487;--rose2:#fce7f1;--dark:#121222;--muted:#76798a;--bg:#fafafa;--line:#eee;--green:#16a34a;--yellow:#ca8a04;--red:#dc2626;--blue:#2563eb;--card:#fff}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--dark)}header{position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid var(--line);padding:18px 16px}h1{margin:0;color:var(--rose);font-size:32px}nav{display:flex;gap:10px;overflow:auto;margin-top:18px;padding-bottom:4px}nav button{border:0;background:#fff;font-weight:800;font-size:16px;padding:13px 15px;border-radius:16px;white-space:nowrap;color:#111}nav button.active{background:var(--rose2);color:var(--rose)}main{padding:18px;max-width:1150px;margin:auto}.topbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}input,select,textarea{width:100%;border:1px solid #e5e7eb;border-radius:14px;padding:14px;font-size:16px;background:#fff}textarea{min-height:90px}.search{flex:1;min-width:240px}.btn{border:0;border-radius:14px;padding:14px 18px;font-weight:800;font-size:16px;background:var(--rose);color:#fff}.btn.secondary{background:#f3f4f6;color:#111}.btn.danger{background:#dc2626}.btn.green{background:#16a34a}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 8px 22px rgba(0,0,0,.04)}.metric{font-size:30px;font-weight:900}.label{font-size:15px;font-weight:800;color:#333;margin-top:4px}.muted{color:var(--muted)}.section-title{font-size:34px;margin:20px 0 8px}.tableWrap{background:#fff;border-radius:22px;overflow:auto;border:1px solid var(--line)}table{width:100%;border-collapse:collapse;min-width:780px}th,td{text-align:left;padding:14px;border-bottom:1px solid #f1f1f1}th{font-size:14px;color:#555;background:#fff}.badge{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}.b-green{background:#dcfce7;color:#166534}.b-yellow{background:#fef3c7;color:#92400e}.b-red{background:#fee2e2;color:#991b1b}.b-blue{background:#dbeafe;color:#1d4ed8}.b-gray{background:#f3f4f6;color:#374151}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:99}.modal.open{display:flex}.modalBox{background:#fff;width:100%;max-width:780px;max-height:92vh;overflow:auto;border-radius:28px 28px 0 0;padding:20px}.formGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.full{grid-column:1/-1}.peopleBox{border:1px dashed #ddd;border-radius:18px;padding:12px;background:#fafafa}.person{display:flex;gap:8px;margin-top:8px}.person input{flex:1}.actions{display:flex;gap:8px;flex-wrap:wrap}.small{padding:8px 10px;border-radius:10px;font-size:13px}.hidden{display:none!important}.printOnly{display:none}@media(min-width:760px){header{display:flex;align-items:center;gap:30px}nav{margin-top:0}.modal{align-items:center}.modalBox{border-radius:28px}}@media print{header,.topbar,.btn,.actions,nav{display:none!important}body{background:#fff}.card,.tableWrap{box-shadow:none;border:1px solid #ddd}.printOnly{display:block}}
</style>
</head>
<body>
<header><h1>👓 Ótica Lumière</h1><nav id="nav"></nav></header>
<main><div class="topbar"><input id="search" class="search" placeholder="Buscar por nome, telefone ou pedido" oninput="render()"><button class="btn" onclick="openClient()">+ Novo cliente</button><button class="btn secondary" onclick="openRepair()">+ Conserto</button></div><section id="app"></section></main>
<div id="modal" class="modal"><div class="modalBox"><div id="modalContent"></div></div></div>
<script>
const $=s=>document.querySelector(s); const store='otica_lumiere_v04';
let state=JSON.parse(localStorage.getItem(store)||'{"clients":[],"repairs":[],"seq":1,"os":1}');
let page='dashboard';
const tabs=[['dashboard','🏠 Dashboard'],['clientes','👥 Clientes'],['laboratorio','🧪 Laboratório'],['prazos','⏰ Prazos'],['semArmacao','👓 Sem armação'],['faltaExame','📋 Falta exame'],['consertos','🔧 Consertos'],['financeiro','💰 Financeiro'],['relatorios','📊 Relatórios']];
function save(){localStorage.setItem(store,JSON.stringify(state));render()}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function today(){return new Date().toISOString().slice(0,10)}
function br(d){return d?d.split('-').reverse().join('/'):''}
function pedido(){return 'PED-'+String(state.seq++).padStart(5,'0')}
function os(){return 'OS-'+String(state.os++).padStart(5,'0')}
function nav(){ $('#nav').innerHTML=tabs.map(t=>`<button onclick="page='${t[0]}';render()" class="${page==t[0]?'active':''}">${t[1]}</button>`).join('')}
function filtered(){let q=$('#search')?.value?.toLowerCase()||'';return state.clients.filter(c=>[c.pedido,c.nome,c.telefone,c.laboratorio,(c.pessoas||[]).join(' ')].join(' ').toLowerCase().includes(q))}
function statusBadge(s){let cls=s=='Entregue'?'b-green':s=='Pronto'?'b-yellow':s=='Atrasado'?'b-red':s=='Em laboratório'?'b-blue':'b-gray';return `<span class="badge ${cls}">${s||'Pendente'}</span>`}
function isLate(c){return c.previsao && c.status!='Entregue' && c.previsao<today() && !c.remarcado}
function dueToday(c){return c.previsao==today() && c.status!='Entregue'}
function calc(){let cs=state.clients, rs=state.repairs; return {dia:cs.filter(c=>c.dataVenda==today()).reduce((s,c)=>s+Number(c.valor||0),0), mes:cs.filter(c=>(c.dataVenda||'').slice(0,7)==today().slice(0,7)).reduce((s,c)=>s+Number(c.valor||0),0), lab:cs.filter(c=>c.status=='Em laboratório').length, pronto:cs.filter(c=>c.status=='Pronto').length, hoje:cs.filter(dueToday).length, atrasados:cs.filter(isLate).length, remarcados:cs.filter(c=>c.remarcado).length, sem:cs.filter(c=>c.semArmacao).length, exame:cs.filter(c=>c.faltaExame).length, consertos:rs.filter(r=>r.status!='Entregue').length, pendente:cs.filter(c=>Number(c.valor||0)>Number(c.entrada||0)).reduce((s,c)=>s+(Number(c.valor||0)-Number(c.entrada||0)),0)}}
function dashboard(){let c=calc(); $('#app').innerHTML=`<h2 class="section-title">Dashboard</h2><p class="muted">Sistema da Ótica Lumière</p><div class="grid">${[['Vendas do dia',money(c.dia)],['Vendas do mês',money(c.mes)],['Em laboratório',c.lab],['Prontos',c.pronto],['Vencendo hoje',c.hoje],['Atrasados',c.atrasados],['Datas remarcadas',c.remarcados],['Sem armação',c.sem],['Falta exame',c.exame],['Consertos',c.consertos],['A receber',money(c.pendente)]].map(x=>`<div class="card"><div class="metric">${x[1]}</div><div class="label">${x[0]}</div></div>`).join('')}</div>`}
function clients(list=filtered(),title='Clientes'){ $('#app').innerHTML=`<h2 class="section-title">${title}</h2><div class="tableWrap"><table><thead><tr><th>Pedido</th><th>Data</th><th>Cliente</th><th>Telefone</th><th>Laboratório</th><th>Previsão</th><th>Status</th><th>Ações</th></tr></thead><tbody>${list.length?list.map(c=>`<tr><td>${c.pedido}</td><td>${br(c.dataVenda)}</td><td><b>${c.nome}</b><br><span class="muted">${(c.pessoas||[]).join(', ')}</span></td><td>${c.telefone||''}</td><td>${c.laboratorio||''}</td><td>${br(c.previsao)}</td><td>${statusBadge(isLate(c)?'Atrasado':c.status)}</td><td><div class="actions"><button class="btn small secondary" onclick="openClient('${c.id}')">Editar</button><button class="btn small green" onclick="deliver('${c.id}')">Entregue</button><button class="btn small secondary" onclick="printClient('${c.id}')">Imprimir</button><button class="btn small danger" onclick="delClient('${c.id}')">Excluir</button></div></td></tr>`).join(''):`<tr><td colspan="8">Nenhum registro.</td></tr>`}</tbody></table></div>`}
function laboratorio(){clients(filtered().filter(c=>c.status=='Em laboratório'||c.laboratorio),'Laboratório')}
function prazos(){let list=filtered().filter(c=>dueToday(c)||isLate(c)||c.remarcado); $('#app').innerHTML=`<h2 class="section-title">Prazos</h2><div class="grid"><div class="card"><b>Vencendo hoje</b><p>${list.filter(dueToday).length} pedido(s)</p></div><div class="card"><b>Atrasados</b><p>${filtered().filter(isLate).length} pedido(s)</p></div><div class="card"><b>Remarcados</b><p>${filtered().filter(c=>c.remarcado).length} pedido(s)</p></div></div><br><div class="tableWrap"><table><thead><tr><th>Pedido</th><th>Cliente</th><th>Previsão</th><th>Nova data</th><th>Motivo</th><th>Ações</th></tr></thead><tbody>${list.length?list.map(c=>`<tr><td>${c.pedido}</td><td>${c.nome}</td><td>${br(c.previsaoAntiga||c.previsao)}</td><td>${br(c.previsao)}</td><td>${c.motivo||''}</td><td><button class="btn small" onclick="reschedule('${c.id}')">Remarcar</button></td></tr>`).join(''):`<tr><td colspan="6">Nenhum prazo pendente.</td></tr>`}</tbody></table></div>`}
function consertos(){let q=$('#search')?.value?.toLowerCase()||'';let list=state.repairs.filter(r=>[r.os,r.nome,r.telefone,r.servico].join(' ').toLowerCase().includes(q)); $('#app').innerHTML=`<h2 class="section-title">Consertos</h2><div class="tableWrap"><table><thead><tr><th>OS</th><th>Data</th><th>Cliente</th><th>Serviço</th><th>Valor</th><th>Previsão</th><th>Status</th><th>Ações</th></tr></thead><tbody>${list.length?list.map(r=>`<tr><td>${r.os}</td><td>${br(r.data)}</td><td>${r.nome}<br><span class="muted">${r.telefone}</span></td><td>${r.servico}</td><td>${money(r.valor)}</td><td>${br(r.previsao)}</td><td>${statusBadge(r.status)}</td><td><button class="btn small secondary" onclick="openRepair('${r.id}')">Editar</button> <button class="btn small green" onclick="repairDone('${r.id}')">Entregue</button> <button class="btn small danger" onclick="delRepair('${r.id}')">Excluir</button></td></tr>`).join(''):`<tr><td colspan="8">Nenhum conserto.</td></tr>`}</tbody></table></div>`}
function financeiro(){let list=filtered(); $('#app').innerHTML=`<h2 class="section-title">Financeiro</h2><div class="tableWrap"><table><thead><tr><th>Pedido</th><th>Cliente</th><th>Valor</th><th>Entrada</th><th>Restante</th><th>Forma</th><th>Situação</th></tr></thead><tbody>${list.map(c=>{let rest=Number(c.valor||0)-Number(c.entrada||0);return `<tr><td>${c.pedido}</td><td>${c.nome}</td><td>${money(c.valor)}</td><td>${money(c.entrada)}</td><td>${money(rest)}</td><td>${c.pagamento||''}</td><td>${rest<=0?statusBadge('Pago'):statusBadge('Pendente')}</td></tr>`}).join('')||'<tr><td colspan="7">Nenhum registro.</td></tr>'}</tbody></table></div>`}
function relatorios(){let c=calc(); $('#app').innerHTML=`<h2 class="section-title">Relatórios</h2><div class="grid"><div class="card"><div class="metric">${state.clients.length}</div><div class="label">Pedidos cadastrados</div></div><div class="card"><div class="metric">${money(c.mes)}</div><div class="label">Vendas do mês</div></div><div class="card"><div class="metric">${state.repairs.length}</div><div class="label">Consertos cadastrados</div></div></div><br><button class="btn" onclick="window.print()">Imprimir relatório</button>`}
function render(){nav(); if(page=='dashboard')dashboard(); else if(page=='clientes')clients(); else if(page=='laboratorio')laboratorio(); else if(page=='prazos')prazos(); else if(page=='semArmacao')clients(filtered().filter(c=>c.semArmacao),'Sem armação'); else if(page=='faltaExame')clients(filtered().filter(c=>c.faltaExame),'Falta exame'); else if(page=='consertos')consertos(); else if(page=='financeiro')financeiro(); else relatorios()}
function openClient(id){let c=state.clients.find(x=>x.id==id)||{id:crypto.randomUUID(),pedido:pedido(),dataVenda:today(),status:'Em laboratório',pessoas:[]}; $('#modalContent').innerHTML=`<h2>${id?'Editar':'Novo'} cliente</h2><div class="formGrid"><div><label>Pedido</label><input id="pedido" value="${c.pedido}" readonly></div><div><label>Data da venda</label><input id="dataVenda" type="date" value="${c.dataVenda||today()}"></div><div><label>Nome</label><input id="nome" value="${c.nome||''}"></div><div><label>Telefone/WhatsApp</label><input id="telefone" value="${c.telefone||''}"></div><div class="full"><label>Endereço</label><input id="endereco" value="${c.endereco||''}"></div><div><label>Laboratório</label><select id="laboratorio"><option></option>${['Henrique','Optec','Magno','Casa','Outro'].map(x=>`<option ${c.laboratorio==x?'selected':''}>${x}</option>`).join('')}</select></div><div><label>Previsão de entrega</label><input id="previsao" type="date" value="${c.previsao||''}"></div><div><label>Status</label><select id="status">${['Em laboratório','Pronto','Entregue','Pendente'].map(x=>`<option ${c.status==x?'selected':''}>${x}</option>`).join('')}</select></div><div><label>Valor total</label><input id="valor" type="number" value="${c.valor||''}"></div><div><label>Entrada</label><input id="entrada" type="number" value="${c.entrada||''}"></div><div><label>Forma de pagamento</label><input id="pagamento" value="${c.pagamento||''}" placeholder="Pix, cartão, dinheiro..."></div><div><label>Foto do óculos (opcional)</label><input id="foto" value="${c.foto||''}" placeholder="Descrição ou link da foto"></div><div class="full peopleBox"><b>Pessoas no mesmo pedido</b><div id="people">${(c.pessoas||[]).map(p=>`<div class="person"><input value="${p}"><button class="btn small danger" onclick="this.parentElement.remove()">X</button></div>`).join('')}</div><button class="btn small secondary" onclick="addPerson()">+ Adicionar pessoa</button></div><div><label><input type="checkbox" id="semArmacao" ${c.semArmacao?'checked':''}> Cliente sem armação</label></div><div><label><input type="checkbox" id="faltaExame" ${c.faltaExame?'checked':''}> Falta exame</label></div><div class="full"><label>Observações</label><textarea id="obs">${c.obs||''}</textarea></div></div><br><div class="actions"><button class="btn" onclick="saveClient('${c.id}',${id?'true':'false'})">Salvar</button><button class="btn secondary" onclick="closeModal()">Cancelar</button></div>`; $('#modal').classList.add('open')}
function addPerson(){let d=document.createElement('div');d.className='person';d.innerHTML='<input placeholder="Nome da pessoa"><button class="btn small danger" onclick="this.parentElement.remove()">X</button>';$('#people').appendChild(d)}
function saveClient(id,editing){let pessoas=[...document.querySelectorAll('#people input')].map(i=>i.value.trim()).filter(Boolean);let c={id,pedido:$('#pedido').value,dataVenda:$('#dataVenda').value,nome:$('#nome').value,telefone:$('#telefone').value,endereco:$('#endereco').value,laboratorio:$('#laboratorio').value,previsao:$('#previsao').value,status:$('#status').value,valor:$('#valor').value,entrada:$('#entrada').value,pagamento:$('#pagamento').value,foto:$('#foto').value,pessoas,semArmacao:$('#semArmacao').checked,faltaExame:$('#faltaExame').checked,obs:$('#obs').value, remarcado: state.clients.find(x=>x.id==id)?.remarcado||false, previsaoAntiga: state.clients.find(x=>x.id==id)?.previsaoAntiga||'', motivo: state.clients.find(x=>x.id==id)?.motivo||''}; if(!editing)state.clients.push(c); else state.clients=state.clients.map(x=>x.id==id?c:x); closeModal();save()}
function openRepair(id){let r=state.repairs.find(x=>x.id==id)||{id:crypto.randomUUID(),os:os(),data:today(),status:'Recebido'}; $('#modalContent').innerHTML=`<h2>${id?'Editar':'Novo'} conserto</h2><div class="formGrid"><div><label>OS</label><input id="ros" value="${r.os}" readonly></div><div><label>Data</label><input id="rdata" type="date" value="${r.data||today()}"></div><div><label>Cliente</label><input id="rnome" value="${r.nome||''}"></div><div><label>Telefone</label><input id="rtel" value="${r.telefone||''}"></div><div class="full"><label>Serviço</label><input id="rserv" value="${r.servico||''}" placeholder="Solda, plaqueta, parafuso, haste..."></div><div><label>Valor</label><input id="rvalor" type="number" value="${r.valor||''}"></div><div><label>Entrada</label><input id="rentrada" type="number" value="${r.entrada||''}"></div><div><label>Previsão</label><input id="rprev" type="date" value="${r.previsao||''}"></div><div><label>Status</label><select id="rstatus">${['Recebido','Em conserto','Aguardando peça','Pronto','Entregue'].map(x=>`<option ${r.status==x?'selected':''}>${x}</option>`).join('')}</select></div><div class="full"><label>Observações</label><textarea id="robs">${r.obs||''}</textarea></div></div><br><button class="btn" onclick="saveRepair('${r.id}',${id?'true':'false'})">Salvar</button> <button class="btn secondary" onclick="closeModal()">Cancelar</button>`; $('#modal').classList.add('open')}
function saveRepair(id,editing){let r={id,os:$('#ros').value,data:$('#rdata').value,nome:$('#rnome').value,telefone:$('#rtel').value,servico:$('#rserv').value,valor:$('#rvalor').value,entrada:$('#rentrada').value,previsao:$('#rprev').value,status:$('#rstatus').value,obs:$('#robs').value}; if(!editing)state.repairs.push(r); else state.repairs=state.repairs.map(x=>x.id==id?r:x); closeModal();save()}
function closeModal(){$('#modal').classList.remove('open')} $('#modal').addEventListener('click',e=>{if(e.target.id=='modal')closeModal()})
function delClient(id){if(confirm('Excluir cliente?')){state.clients=state.clients.filter(x=>x.id!=id);save()}}
function delRepair(id){if(confirm('Excluir conserto?')){state.repairs=state.repairs.filter(x=>x.id!=id);save()}}
function deliver(id){let c=state.clients.find(x=>x.id==id); if(c){c.status='Entregue';c.semArmacao=false;c.faltaExame=false;save()}}
function repairDone(id){let r=state.repairs.find(x=>x.id==id); if(r){r.status='Entregue';save()}}
function reschedule(id){let c=state.clients.find(x=>x.id==id);let nova=prompt('Nova data prevista (AAAA-MM-DD):',c.previsao||today()); if(!nova)return; let motivo=prompt('Motivo/observação da remarcação:',''); c.previsaoAntiga=c.previsao;c.previsao=nova;c.motivo=motivo;c.remarcado=true;save()}
function printClient(id){let c=state.clients.find(x=>x.id==id); $('#modalContent').innerHTML=`<h2>Ficha do pedido</h2><div class="card"><h3>${c.pedido} - ${c.nome}</h3><p><b>Data da venda:</b> ${br(c.dataVenda)}</p><p><b>Telefone:</b> ${c.telefone||''}</p><p><b>Endereço:</b> ${c.endereco||''}</p><p><b>Pessoas:</b> ${(c.pessoas||[]).join(', ')}</p><p><b>Laboratório:</b> ${c.laboratorio||''}</p><p><b>Previsão:</b> ${br(c.previsao)}</p><p><b>Valor:</b> ${money(c.valor)} | <b>Entrada:</b> ${money(c.entrada)} | <b>Restante:</b> ${money(Number(c.valor||0)-Number(c.entrada||0))}</p><p><b>Observações:</b> ${c.obs||''}</p></div><br><button class="btn" onclick="window.print()">Imprimir</button> <button class="btn secondary" onclick="closeModal()">Fechar</button>`; $('#modal').classList.add('open')}
render();
</script>
</body>
</html>
